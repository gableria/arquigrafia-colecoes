<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grid de imagens a partir de dados</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
<style>
  :root{
    --bg: #14161a; --panel: #1d2026; --panel-2: #23262e; --line: #33373f;
    --text: #e8e8ea; --muted: #9a9fa8; --accent: #7dd3c0; --danger: #ff6b6b;
  }
  *{ box-sizing: border-box; }
  body{ margin:0; font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
  #app{ max-width: 1500px; margin: 0 auto; padding: 32px 20px 60px; }
  h1{ font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  .sub{ color: var(--muted); font-size: 14px; margin: 0 0 20px; }
  .toolbar{
    display:flex; align-items:center; gap: 12px; background: var(--panel);
    border: 1px solid var(--line); border-radius: 12px; padding: 14px 18px; margin-bottom: 24px;
  }
  button{
    background: var(--accent); color: #0e0f12; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  button.secundario{ background: var(--panel-2); color: var(--text); border: 1px solid var(--line); }
  .erro{ color: var(--danger); font-size: 13px; }

  .grid{
    display: grid;
    grid-template-columns: repeat(6, 220px);
    gap: 18px;
  }
  @media (max-width: 1400px){
    .grid{ grid-template-columns: repeat(3, 220px); }
  }
  @media (max-width: 720px){
    .grid{ grid-template-columns: repeat(2, 220px); }
  }

  .card{
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px; display:flex; flex-direction: column; align-items:center; gap: 8px;
  }
  .card canvas{
    width: 220px; height: 220px; border-radius: 6px; background: #0e0f12; display:block;
  }
  .card .nome{ font-size: 12px; color: var(--muted); text-align:center; }
  .card .baixar{
    font-size: 11px; padding: 5px 10px; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 6px; cursor: pointer;
  }
</style>
</head>
<body>
<div id="app">
  <h1>Grid de imagens geradas a partir de dados</h1>
  <p class="sub">Cada imagem (220×220) corresponde a um grupo de dados em <code>colecoes.json</code>. Grid de 6 colunas, 1 imagem por coluna.</p>

  <div class="toolbar">
    <button @click="carregar">Recarregar dados</button>
    <button class="secundario" @click="baixarTodas" :disabled="!colecoes.length">Baixar todas (PNG)</button>
    <span class="erro" v-if="erro">{{ erro }}</span>
  </div>

  <div class="grid">
    <div class="card" v-for="(item, i) in colecoes" :key="i">
      <canvas :ref="el => registrarCanvas(el, i)" width="600" height="600"></canvas>
      <span class="nome">{{ item.nome || ('#' + (i + 1)) }}</span>
      <button class="baixar" @click="baixarUma(i)">baixar</button>
    </div>
  </div>
</div>

<script>
const { createApp, ref, reactive, nextTick } = Vue;

// -----------------------------------------------------------------
// REGRAS DE FAIXA: os números do JSON caem dentro de intervalos, que
// apontam pro arquivo correspondente em assets/.
// -----------------------------------------------------------------
function mapaFundo(imagens) {
  if (imagens <= 5) return 'assets/fundo-verde.png';
  if (imagens <= 10) return 'assets/fundo-azul.png';
  if (imagens <= 20) return 'assets/fundo-laranja.png';
  return 'assets/fundo-rosa.png';
}

// camada-linha: combina a faixa de "periodo" com a relação "tags" / "imagens"
function mapaCamadaLinha(periodo, tags, imagens) {
  let sufixoPeriodo;
  if (periodo <= 9) sufixoPeriodo = '-anos';
  else if (periodo <= 99) sufixoPeriodo = '-decadas';
  else sufixoPeriodo = '-seculos'; // acima de 100

  let sufixoRelacao;
  if (tags < imagens) sufixoRelacao = '-baixa.png';         // tags:imagens < 1/1
  else if (tags === imagens) sufixoRelacao = '-media.png';  // tags:imagens = 1/1
  else sufixoRelacao = '-alta.png';                          // tags:imagens > 1/1

  return `assets/linhas${sufixoPeriodo}${sufixoRelacao}`;
}

const OVERLAY_BLEND = 'multiply';
const PROCEDURAL_BLEND = 'multiply';

// camada 3: 6 eixos horizontais (invisíveis), só os círculos aparecem
const NUM_EIXOS = 6;
const EIXO_X1 = 100;
const EIXO_X2 = 500;
const MARGEM_Y = 70;
const RAIO_CIRCULO = 14;

function mapValorParaX(valor) {
  const bruto = (valor === null || valor === undefined) ? 50 : valor; // sem dado -> centro
  const v = Math.max(0, Math.min(100, bruto));
  const t = v / 100;
  return EIXO_X1 + t * (EIXO_X2 - EIXO_X1);
}
function calcularYDoEixo(index) {
  const alturaUtil = 600 - MARGEM_Y * 2;
  const passo = alturaUtil / (NUM_EIXOS - 1);
  return MARGEM_Y + passo * index;
}

// cache simples de imagens já carregadas, pra não recarregar o mesmo
// arquivo de asset várias vezes quando vários itens usam o mesmo fundo/traço
const cacheImagens = new Map();
function carregarImagem(src) {
  if (cacheImagens.has(src)) return cacheImagens.get(src);
  const promessa = new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
  cacheImagens.set(src, promessa);
  return promessa;
}

// -----------------------------------------------------------------
// Desenha UM item (um grupo de dados) num canvas específico.
//
// Formato esperado de cada item (vindo de colecoes.json):
// {
//   "nome": "opcional, aparece como legenda",
//   "imagens": 7,                                   // número -> ver faixas em mapaFundo()
//   "periodo": 45,                                  // número -> parte da camada-linha (mapaCamadaLinha())
//   "tags": 12,                                     // número -> combinado com "imagens" define a outra parte da camada-linha
//   "interpretacoes": [20, 60, null, 90, 10, 100]   // 6 valores, 0..100 ou null -> camada-pontos
// }
// -----------------------------------------------------------------
async function desenharComposicao(ctx, dados) {
  ctx.clearRect(0, 0, 600, 600);
  ctx.globalCompositeOperation = 'source-over';

  if (typeof dados.imagens !== 'number') throw new Error(`"imagens" precisa ser um número (recebido: ${JSON.stringify(dados.imagens)})`);
  if (typeof dados.periodo !== 'number') throw new Error(`"periodo" precisa ser um número (recebido: ${JSON.stringify(dados.periodo)})`);
  if (typeof dados.tags !== 'number') throw new Error(`"tags" precisa ser um número (recebido: ${JSON.stringify(dados.tags)})`);
  const interpretacoes = dados.interpretacoes ?? dados['interpretações'];
  if (!Array.isArray(interpretacoes) || interpretacoes.length !== NUM_EIXOS) {
    throw new Error(`"interpretacoes" precisa ser um array com ${NUM_EIXOS} valores`);
  }

  // camada de fundo
  const imgFundo = await carregarImagem(mapaFundo(dados.imagens));
  ctx.globalCompositeOperation = 'source-over';
  ctx.drawImage(imgFundo, 0, 0, 600, 600);

  // camada-linha
  const imgCamadaLinha = await carregarImagem(mapaCamadaLinha(dados.periodo, dados.tags, dados.imagens));
  ctx.globalCompositeOperation = OVERLAY_BLEND;
  ctx.drawImage(imgCamadaLinha, 0, 0, 600, 600);

  // camada-pontos
  ctx.globalCompositeOperation = PROCEDURAL_BLEND;
  ctx.fillStyle = 'black';
  interpretacoes.forEach((valor, index) => {
    const cx = mapValorParaX(valor);
    const cy = calcularYDoEixo(index);
    ctx.beginPath();
    ctx.arc(cx, cy, RAIO_CIRCULO, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.globalCompositeOperation = 'source-over';
}

const app = createApp({
  setup() {
    // -----------------------------------------------------------------
    // Formato esperado de colecoes.json (arquivo na raiz):
    // {
    //   "colecoes": [
    //     { "nome": "item 1", "imagens": 3,  "periodo": 5,  "tags": 4,  "interpretacoes": [...] },
    //     { "nome": "item 2", "imagens": 12, "periodo": 45, "tags": 15, "interpretacoes": [...] },
    //     ...
    //   ]
    // }
    // -----------------------------------------------------------------
    const colecoes = ref([]);
    const erro = ref('');
    const canvases = reactive({}); // { indice: elementoCanvas }

    function registrarCanvas(el, indice) {
      if (el) canvases[indice] = el;
    }

    async function desenharTodas() {
      for (let i = 0; i < colecoes.value.length; i++) {
        const canvasEl = canvases[i];
        if (!canvasEl) continue;
        try {
          const ctx = canvasEl.getContext('2d');
          await desenharComposicao(ctx, colecoes.value[i]);
        } catch (e) {
          console.error(`Erro no item ${i} (${colecoes.value[i].nome || ''}):`, e.message);
        }
      }
    }

    async function carregar() {
      erro.value = '';
      try {
        const resposta = await fetch('colecoes.json', { cache: 'no-store' });
        if (!resposta.ok) throw new Error(`não foi possível ler colecoes.json (HTTP ${resposta.status})`);
        const json = await resposta.json();

        if (!Array.isArray(json.colecoes)) {
          throw new Error('o JSON precisa ter uma chave "colecoes" com um array de itens');
        }
        colecoes.value = json.colecoes;

        await nextTick(); // garante que todos os <canvas> já estão no DOM
        await desenharTodas();
      } catch (e) {
        erro.value = 'Erro ao carregar colecoes.json: ' + e.message;
        colecoes.value = [];
      }
    }

    function baixarUma(indice) {
      const canvasEl = canvases[indice];
      if (!canvasEl) return;
      const item = colecoes.value[indice];
      const link = document.createElement('a');
      link.download = (item.nome || `imagem-${indice + 1}`) + '.png';
      link.href = canvasEl.toDataURL('image/png');
      link.click();
    }

    function baixarTodas() {
      colecoes.value.forEach((_, i) => baixarUma(i));
    }

    carregar(); // carrega assim que a página abre

    return { colecoes, erro, registrarCanvas, carregar, baixarUma, baixarTodas };
  }
});

app.mount('#app');
</script>
</body>
</html>
